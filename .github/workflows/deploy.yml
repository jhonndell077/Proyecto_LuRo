name: Deploy to Firebase

run-name: >-
  Firebase Deploy ·
  ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target || 'hosting' }} ·
  ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Objetivo de despliegue
        required: true
        default: hosting
        type: choice
        options:
          - hosting
          - functions
          - all
      ref:
        description: Rama o referencia a desplegar
        required: true
        default: main
        type: string
      firebase_project:
        description: Proyecto Firebase de destino
        required: true
        default: luro-control
        type: string
      requested_by:
        description: Usuario que solicito el despliegue
        required: false
        type: string
      request_id:
        description: Identificador interno de la solicitud
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target || 'hosting' }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      FIREBASE_PROJECT_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.firebase_project || 'luro-control' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ env.DEPLOY_REF }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Prepare Firebase credentials
      shell: bash
      run: |
        cat <<'JSON' > "$RUNNER_TEMP/firebase-service-account.json"
        ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        JSON
        echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    - name: Install Functions dependencies
      if: env.DEPLOY_TARGET == 'functions' || env.DEPLOY_TARGET == 'all'
      run: npm ci --prefix functions

    - name: Deploy selected target
      shell: bash
      run: |
        echo "Requested by: ${{ github.event_name == 'workflow_dispatch' && inputs.requested_by || github.actor }}"
        echo "Request ID: ${{ github.event_name == 'workflow_dispatch' && inputs.request_id || 'push-trigger' }}"
        echo "Target: $DEPLOY_TARGET"
        echo "Ref: $DEPLOY_REF"
        echo "Project: $FIREBASE_PROJECT_ID"

        case "$DEPLOY_TARGET" in
          functions)
            firebase deploy --project "$FIREBASE_PROJECT_ID" --only "functions" --non-interactive
            ;;
          all)
            firebase deploy --project "$FIREBASE_PROJECT_ID" --only "functions,hosting" --non-interactive
            ;;
          *)
            firebase deploy --project "$FIREBASE_PROJECT_ID" --only "hosting" --non-interactive
            ;;
        esac
